<!DOCTYPE html>
<html>
<head>
    <title>TG Chat V7</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --blue: #2481cc; --bg: #f0f2f5; --me: #effdde; --active: #f1f6fa; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 310px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .av-box { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; background: #2481cc; }
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 15px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .me { align-self: flex-end; background: var(--me); }
        .other { align-self: flex-start; background: white; }
        .btn-blue { background: var(--blue); color: white; padding: 12px; width: 100%; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 5000; display: flex; justify-content: center; align-items: center; }
        .box { background: white; padding: 30px; border-radius: 20px; width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="auth-page" class="modal">
        <div class="box">
            <h2 id="title">TELEGRAM</h2>
            <input id="u" placeholder="用户名">
            <input id="p" type="password" placeholder="密码">
            <button class="btn-blue" onclick="doAuth()">确认进入</button>
            <p id="switch" onclick="toggleMode()" style="color:var(--blue); cursor:pointer; font-size:12px; margin-top:15px">没有账号？点击注册</p>
        </div>
    </div>

    <div id="sidebar">
        <div style="padding:20px; border-bottom:1px solid #eee"><b>我的聊天室</b></div>
        <div id="user-list" style="flex:1; overflow-y:auto; padding:10px">
            <p style="color:#999; text-align:center">点击注册并登录后可见</p>
        </div>
    </div>

    <div id="main">
        <div id="chat-h" style="padding:15px; background:white; border-bottom:1px solid #eee; font-weight:bold">公共聊天频道</div>
        <div id="msgs"></div>
        <div style="padding:15px; display:flex; gap:10px; background:white; border-top:1px solid #eee">
            <input id="m" style="flex:1; border-radius:20px; padding:12px; border:1px solid #ddd" placeholder="输入消息...">
            <button onclick="send()" style="background:var(--blue); color:white; padding:0 25px; border-radius:20px; border:none; font-weight:bold">发送</button>
        </div>
    </div>

    <!-- 引用公共 Socket.io 脚本 -->
    <script src="https://socket.io"></script>
    <script>
        const socket = io();
        let me = "", mode = "login";

        socket.on('connect', () => { console.log('连接成功'); });
        socket.on('connect_error', () => { alert('无法连接到服务器，请刷新页面'); });

        function toggleMode() {
            mode = (mode === 'login') ? 'register' : 'login';
            document.getElementById('title').innerText = (mode === 'login') ? 'TELEGRAM' : 'REGISTER';
            document.getElementById('switch').innerText = (mode === 'login') ? '没有账号？点击注册' : '已有账号？点击登录';
        }

        function doAuth() {
            const u = document.getElementById('u').value.trim();
            const p = document.getElementById('p').value.trim();
            if(!u || !p) return alert("请输入账号密码");
            
            if(!socket.connected) return alert("正在连接服务器，请稍候...");
            socket.emit(mode, { user: u, pass: p });
        }

        socket.on('auth-result', r => {
            if(r.success) {
                if(r.isReg) { alert(r.msg); toggleMode(); }
                else {
                    me = r.user;
                    document.getElementById('auth-page').style.display = 'none';
                }
            } else alert(r.msg);
        });

        socket.on('sys-msg', m => alert(m));

        function send() {
            const v = document.getElementById('m').value;
            if(v && me) {
                socket.emit('send-msg', { to: 'all', text: v });
                document.getElementById('m').value = '';
            }
        }

        socket.on('msg', m => {
            const box = document.getElementById('msgs');
            const isMe = m.from === me;
            box.innerHTML += `<div class="bubble ${isMe?'me':'other'}"><b>${m.from}:</b> ${m.text}<div style="font-size:10px;color:#999;text-align:right">${m.time}</div></div>`;
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
